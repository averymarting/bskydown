name: Bluesky Scraper - Download & Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      target_username:
        description: "Bluesky handle to scrape (e.g. someone.bsky.social) - original posts only, reposts skipped"
        required: true
        type: string
      mode:
        description: "Scrape source"
        required: true
        type: choice
        options:
          - timeline
          - media
        default: timeline
      content_type:
        description: "What to download"
        required: true
        type: choice
        options:
          - both
          - images
          - videos
        default: both
      max_posts:
        description: "Max number of the user's posts to scan"
        required: false
        default: "100"
        type: string
      hashtag_count:
        description: "Max hashtags to save per post"
        required: false
        default: "3"
        type: string
      drive_folder_name:
        description: "Google Drive folder name (created automatically if it doesn't exist)"
        required: true
        type: string
      drive_id:
        description: "(Optional) Shared Drive ID - leave blank unless you're using a Shared Drive"
        required: false
        default: ""
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_creds.json

      - name: Run scraper
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          TARGET_USERNAME: ${{ github.event.inputs.target_username }}
          MODE: ${{ github.event.inputs.mode }}
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
          HASHTAG_COUNT: ${{ github.event.inputs.hashtag_count }}
          DRIVE_FOLDER_NAME: ${{ github.event.inputs.drive_folder_name }}
          DRIVE_ID: ${{ github.event.inputs.drive_id }}
          GOOGLE_APPLICATION_CREDENTIALS: google_creds.json
          GOOGLE_SHEET_ID: "1gclT2XS4pkdAoQPP_lKo8nHVbHZgiuePOacG-ZCkZgg"
        run: python bsky_scraper.py

      - name: Clean up credentials file
        if: always()
        run: rm -f google_creds.json
